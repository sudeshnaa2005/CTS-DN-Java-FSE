<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4.2 - Four Column Layout</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        .four-col-box {
            background-color: #e8f5e9;
            border: 2px solid #2e7d32;
            padding: 25px 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="container mt-5">
        <h3 class="mb-4 text-center">Exercise 4.2: Four-Column Equal Layout</h3>
        
        <div class="row g-3">
            
            <div class="col-12 col-sm-3">
                <div class="four-col-box text-center text-success">
                    <strong>Col 1</strong><br><code>col-sm-3</code>
                </div>
            </div>

            <div class="col-12 col-sm-3">
                <div class="four-col-box text-center text-success">
                    <strong>Col 2</strong><br><code>col-sm-3</code>
                </div>
            </div>

            <div class="col-12 col-sm-3">
                <div class="four-col-box text-center text-success">
                    <strong>Col 3</strong><br><code>col-sm-3</code>
                </div>
            </div>

            <div class="col-12 col-sm-3">
                <div class="four-col-box text-center text-success">
                    <strong>Col 4</strong><br><code>col-sm-3</code>
                </div>
            </div>

        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
