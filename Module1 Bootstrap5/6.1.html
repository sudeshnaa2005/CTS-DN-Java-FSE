<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6.1 - Responsive Flexbox Navbar</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        /* Custom styles to clearly visualize the navbar elements */
        .custom-nav {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
        }
        .nav-item-box {
            background-color: #0d6efd;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 500;
            text-align: center;
        }
        .nav-item-box:hover {
            background-color: #0b5ed7;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container mt-5">
        <h3 class="text-center mb-2">Exercise 6.1: Responsive Flexbox Utilities</h3>
        <p class="text-center text-muted mb-4">
            Uses <code>d-flex</code>, <code>flex-column</code> (mobile vertical stack), and <code>flex-md-row</code> (desktop row).
        </p>
        
        <div class="custom-nav d-flex flex-column flex-md-row p-3 gap-2">
            
            <a href="#" class="nav-item-box bg-dark">Platera App</a>
            
            <a href="#" class="nav-item-box">Home</a>
            <a href="#" class="nav-item-box">Dashboard</a>
            <a href="#" class="nav-item-box">Orders</a>
            
            <a href="#" class="nav-item-box bg-secondary ms-md-auto">Profile</a>

        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
