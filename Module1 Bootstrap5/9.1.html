<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.1 - Contextual Buttons</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card p-4 shadow-sm mx-auto" style="max-width: 650px;">
            <h3 class="text-center mb-2">Exercise 9.1: Button Contextual Classes</h3>
            <p class="text-center text-muted small mb-4">Demonstrating solid colors and modern outline state combinations.</p>
            
            <h5 class="text-secondary border-bottom pb-2 mb-3">Solid Buttons</h5>
            <div class="d-flex flex-wrap gap-2 mb-4">
                <button type="button" class="btn btn-primary">Primary</button>
                <button type="button" class="btn btn-secondary">Secondary</button>
                <button type="button" class="btn btn-success">Success</button>
                <button type="button" class="btn btn-danger">Danger</button>
                <button type="button" class="btn btn-warning">Warning</button>
                <button type="button" class="btn btn-info">Info</button>
                <button type="button" class="btn btn-light">Light</button>
                <button type="button" class="btn btn-dark">Dark</button>
            </div>

            <h5 class="text-secondary border-bottom pb-2 mb-3">Outline Buttons</h5>
            <div class="d-flex flex-wrap gap-2">
                <button type="button" class="btn btn-outline-primary">Primary Outline</button>
                <button type="button" class="btn btn-outline-secondary">Secondary Outline</button>
                <button type="button" class="btn btn-outline-success">Success Outline</button>
                <button type="button" class="btn btn-outline-danger">Danger Outline</button>
                <button type="button" class="btn btn-outline-warning">Warning Outline</button>
                <button type="button" class="btn btn-outline-info">Info Outline</button>
                <button type="button" class="btn btn-outline-dark">Dark Outline</button>
            </div>

        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
