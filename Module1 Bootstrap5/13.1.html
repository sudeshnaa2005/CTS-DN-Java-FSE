<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13.1 - Contextual Dashboards</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h3 class="text-center mb-2">Exercise 13.1: Dashboard Metrics Panel</h3>
        <p class="text-center text-muted small mb-5">Demonstrating utility-driven background and text color assignments.</p>

        <div class="row g-4">
            
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card bg-primary text-white border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h6 class="text-uppercase text-white-50 small fw-bold">Total Orders</h6>
                        <h2 class="display-6 fw-bold mb-0">1,248</h2>
                        <p class="mb-0 mt-2 small">📈 +12% since yesterday</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card bg-success text-white border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h6 class="text-uppercase text-white-50 small fw-bold">Revenue Got</h6>
                        <h2 class="display-6 fw-bold mb-0">$14,230</h2>
                        <p class="mb-0 mt-2 small">💰 Target reached safely</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card bg-warning text-dark border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h6 class="text-uppercase text-black-50 small fw-bold">Pending Cooking</h6>
                        <h2 class="display-6 fw-bold mb-0">18</h2>
                        <p class="mb-0 mt-2 small">⏳ Needs driver routing</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card bg-danger text-white border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h6 class="text-uppercase text-white-50 small fw-bold">Cancelled Runs</h6>
                        <h2 class="display-6 fw-bold mb-0">3</h2>
                        <p class="mb-0 mt-2 small">⚠️ Refund processing complete</p>
