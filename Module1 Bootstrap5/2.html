<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 2.2 JS Test</title>
    <!-- Local Bootstrap 5 CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5 text-center">
        <h1 class="text-primary mb-4">Exercise 2.2: JavaScript Plugins</h1>
        
        <!-- Interactive Alert Component -->
        <div class="alert alert-warning alert-dismissible fade show" role="alert">
            <strong>JS is working!</strong> Click the X button on the right to dismiss this alert.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>

    <!-- Local Bootstrap 5 JS Bundle (Enables the close button functionality) -->
    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
