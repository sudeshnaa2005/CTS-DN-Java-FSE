<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8.1 - Registration Form</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card p-4 shadow-sm mx-auto" style="max-width: 500px;">
            <h3 class="text-center mb-4">Exercise 8.1: Registration Form</h3>
            
            <form>
                <div class="mb-3">
                    <label for="fullName" class="form-label fw-semibold">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text" id="basic-addon1">@</span>
                        <input type="text" class="form-control" id="username" placeholder="username" aria-describedby="basic-addon1" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="emailAddress" class="form-label fw-semibold">Email address</label>
                    <input type="email" class="form-control" id="emailAddress" placeholder="name@example.com" required>
                </div>

                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="termsCheck" required>
                        <label class="form-check-label text-muted small" for="termsCheck">
                            I agree to the terms and privacy policy.
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>

        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
