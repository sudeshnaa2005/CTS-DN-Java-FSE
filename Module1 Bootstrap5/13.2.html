<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13.2 - Gradient Feature</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h3 class="text-center mb-4">Exercise 13.2: Dark Gradient Hero</h3>
        
        <div class="p-5 text-white bg-dark bg-gradient rounded-3 shadow-lg mx-auto" style="max-width: 700px;">
            <div class="py-3 text-center">
                
                <h1 class="display-5 fw-bold text-white mb-3">Premium Dark Gradient</h1>
                
                <p class="lead text-light-50 mb-4">
                    This block satisfies Exercise 13.2 by combining the <code>bg-dark</code> background color with the utility modifier class <code>bg-gradient</code>. This overlays a smooth, translucent top-to-bottom shading shift directly over the element.
                </p>
                
                <button class="btn btn-outline-light btn-md px-4" type="button">Action Button</button>
                
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
