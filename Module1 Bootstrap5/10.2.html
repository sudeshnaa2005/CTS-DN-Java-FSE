<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 10.2 - Tabbed Navigation</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card p-4 shadow-sm mx-auto" style="max-width: 600px;">
            <h3 class="text-center mb-4">Exercise 10.2: Tabbed Navigation</h3>

            <h5 class="text-secondary small fw-bold mb-2">Classic Tabs Layout (<code>nav-tabs</code>)</h5>
            <ul class="nav nav-tabs mb-5">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Active Tab</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Profile Settings</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">History Log</a>
                </li>
            </ul>

            <h5 class="text-secondary small fw-bold mb-2">Pill Shape Buttons Layout (<code>nav-pills</code>)</h5>
            <ul class="nav nav-pills">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Active Pill</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Delivery Address</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Payment Methods</a>
                </li>
            </ul>

        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
