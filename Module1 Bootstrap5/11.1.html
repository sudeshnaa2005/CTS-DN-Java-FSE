<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 11.1 - Profile Card</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h3 class="text-center mb-4">Exercise 11.1: Profile Card Component</h3>
        
        <div class="card shadow-sm mx-auto" style="max-width: 350px;">
            
            <svg class="bd-placeholder-img card-img-top" width="100%" height="180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Placeholder: Image cap" preserveAspectRatio="xMidYMid slice" focusable="false">
                <title>Placeholder</title>
                <rect width="100%" height="100%" fill="#6c757d"></rect>
                <text x="50%" y="50%" fill="#dee2e6" dy=".3em" text-anchor="middle" font-size="1.25rem" font-family="sans-serif">Profile Picture</text>
            </svg>
            
            <div class="card-body text-center">
                
                <h5 class="card-title fw-bold mb-1">Alex Morgan</h5>
                
                <p class="card-text text-muted small mb-3">Lead Full-Stack Developer</p>
                
                <p class="card-text text-secondary small">
                    Building robust, scalable applications for Platera. Specialized in cloud architectures, responsive design interfaces, and modern API architectures.
                </p>
                
                <hr class="my-3">
                
                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-sm" type="button">Connect</button>
                    <button class="btn btn-outline-secondary btn-sm" type="button">View Portfolio</button>
                </div>
                
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
